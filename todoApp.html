<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>TODO List ⏰</h1>
    <input type="text" id="text" />
    <button id="addBtn">add</button>
    <button id="refresh">🔄</button><br />
    <input type="text" id="uid" placeholder="id 입력해주세요." />
    <button id="findByIdBtn">search</button>
    <button id="rmBtn">🗑️</button>
    <button id="statusBtn">✅</button>
    <ul class="list"></ul>

    <script>
      const list = document.querySelector(".list");

      class TodoApp {
        todos = [];
        nextId = 1;

        // 추가
        addTodo(text) {
          const todo = {
            id: this.nextId++,
            text, // 속성명과 매개변수명이 같을 때
            completed: false,
          };
          this.todos.push(todo);
        }

        // 전체 조회
        showTodo() {
          this.todos.forEach((todo) => {
            let completedVal = todo.completed ? "✅" : "☑️";
            const val = `${completedVal}  ${todo.id}  ${todo.text}`;
            const li = document.createElement("li");
            li.textContent = val;
            list.appendChild(li);
          });
        }

        // id로 조회
        findTodoById(id) {
          const todo = this.todos.find((t) => t.id === id);

          if (!todo) return;

          let completedVal = todo.completed ? "✅" : "☑️";
          const val = `${completedVal}  ${todo.id}  ${todo.text}`;
          const li = document.createElement("li");
          li.textContent = val;
          list.appendChild(li);
        }

        // 삭제
        removeTodo(id) {
          this.todos = this.todos.filter((t) => t.id !== id);
        }

        // 완료
        toggleTodo(id) {
          const todo = this.todos.find((t) => t.id === id);
          todo.completed = !todo.completed;
        }
      }

      const app = new TodoApp();
      // 초기 데이터 (테스트용)
      app.addTodo("공부하기");
      app.addTodo("운동하기");
      app.showTodo();

      const textInput = document.getElementById("text");
      const uidInput = document.getElementById("uid");

      document.getElementById("addBtn").addEventListener("click", () => {
        const text = textInput.value;
        if (!text) return;

        app.addTodo(text);

        list.innerHTML = "";
        textInput.value = "";
        app.showTodo();
    });

    document.getElementById("refresh").addEventListener("click", () => {
      uidInput.value = "";
      list.innerHTML = "";
      app.showTodo();
    });
    
    document.getElementById("rmBtn").addEventListener("click", () => {
        const id = Number(uidInput.value);
        if (!id) return;

        uidInput.value = "";
        list.innerHTML = "";
        app.removeTodo(id);
        app.showTodo();
      });

      document.getElementById("findByIdBtn").addEventListener("click", () => {
        const id = Number(uidInput.value);
        if (!id) return;

        uidInput.value = "";
        list.innerHTML = "";
        app.findTodoById(id);
      });

      document.getElementById("statusBtn").addEventListener("click", () => {
        const id = Number(uidInput.value);
        if (!id) return;

        uidInput.value = "";
        list.innerHTML = "";
        app.toggleTodo(id);
        app.showTodo();
      });

    </script>
  </body>
</html>
